# Shadowrocket main config. No proxy nodes or subscription secrets.

[Rule]
# Local networks
IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
IP-CIDR,224.0.0.0/4,DIRECT,no-resolve
IP-CIDR6,fe80::/10,DIRECT,no-resolve

# Remote direct rules. Use Shadowrocket's rule update to refresh this list.
RULE-SET,https://raw.githubusercontent.com/yqlbd/rules/main/direct.list,DIRECT

# Remote proxy rules. Use Shadowrocket's rule update to refresh this list.
RULE-SET,https://raw.githubusercontent.com/yqlbd/rules/main/proxy.list,PROXY

# Mainland China direct
GEOIP,CN,DIRECT

# Default route
FINAL,PROXY
